<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Card — 3D Model</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }

    /* Kill A-Frame VR button on Android */
    .a-enter-vr-button,
    .a-enter-ar-button,
    .a-orientation-modal,
    [aframe-injected] {
      display: none !important;
    }

    #scan-hint {
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      text-align: center;
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999999;
      transition: opacity 0.5s;
    }
    #scan-hint.hidden { opacity: 0; pointer-events: none; }
    #found-badge {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,200,100,0.85);
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 600;
      z-index: 999999;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #found-badge.show { opacity: 1; }
  </style>
  <script>
    AFRAME.registerComponent('model-target', {
      init: function () {
        const hint = document.getElementById('scan-hint');
        const badge = document.getElementById('found-badge');

        this.el.addEventListener('targetFound', () => {
          hint.classList.add('hidden');
          badge.classList.add('show');
          setTimeout(() => badge.classList.remove('show'), 2000);
        });

        this.el.addEventListener('targetLost', () => {
          hint.classList.remove('hidden');
        });
      }
    });
  </script>
</head>
<body>
  <div id="scan-hint">Point your camera at the card</div>
  <div id="found-badge">Card detected!</div>

  <!--
    YOUR FILES (all 3 in the same GitHub repo):
    1. index.html    — this file
    2. targets.mind  — compiled from your image
    3. model.glb     — your 3D model (rename your file to model.glb)

    TWEAKING THE MODEL:
    - position: "0 0.3 0" = centered, floating above card. Increase Y to raise it higher.
    - scale: "0.5 0.5 0.5" = half size. Increase for bigger, decrease for smaller.
    - rotation: starting rotation. The animation spins it from there.
    - animation dur: 5000 = 5 seconds per full rotation. Lower = faster spin.
    - Remove the animation line entirely if you don't want it to spin.
  -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="5000">
      <a-asset-item id="model" src="./model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" model-target>

      <!-- 3D model floating above the card, slowly spinning -->
      <a-gltf-model
        src="#model"
        position="0 0.3 0.1"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        animation="property: rotation;
                   to: 0 360 0;
                   loop: true;
                   dur: 5000;
                   easing: linear">
      </a-gltf-model>

      <!-- Lighting for the model -->
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.0" position="1 2 1"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.4" position="-1 1 -1"></a-light>

    </a-entity>
  </a-scene>
</body>
</html>
